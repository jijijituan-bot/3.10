<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>视频转GIF - 简化版（无需FFmpeg）</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .info-box {
            background: rgba(255, 193, 7, 0.1);
            border-left: 4px solid #ffc107;
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
            color: rgba(255, 255, 255, 0.8);
        }

        .info-box h3 {
            color: #ffc107;
            margin-bottom: 10px;
        }

        canvas {
            display: none;
        }

        .method-selector {
            display: flex;
            gap: 15px;
            margin: 20px 0;
        }

        .method-btn {
            flex: 1;
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(102, 126, 234, 0.3);
            border-radius: 12px;
            color: rgba(255, 255, 255, 0.8);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .method-btn:hover {
            border-color: #667eea;
            background: rgba(102, 126, 234, 0.1);
        }

        .method-btn.active {
            border-color: #667eea;
            background: rgba(102, 126, 234, 0.2);
            color: white;
        }
    </style>
</head>
<body>
    <div class="rain" id="rain"></div>

    <div class="container">
        <h1>🎬 视频转GIF</h1>
        <p class="subtitle">简化版 - 无需复杂库，快速转换</p>

        <div class="info-box">
            <h3>💡 使用说明</h3>
            <p>这是简化版本，使用浏览器原生功能提取视频帧。</p>
            <p><strong>优点：</strong>无需加载外部库，速度快，兼容性好</p>
            <p><strong>限制：</strong>生成的GIF质量可能不如专业工具</p>
        </div>

        <div class="method-selector">
            <div class="method-btn active" onclick="selectMethod('simple')">
                <h3>🚀 快速模式</h3>
                <p style="font-size: 12px; margin-top: 5px;">使用浏览器原生功能</p>
            </div>
            <div class="method-btn" onclick="selectMethod('advanced')">
                <h3>⚡ 高级模式</h3>
                <p style="font-size: 12px; margin-top: 5px;">使用FFmpeg（需要网络）</p>
            </div>
        </div>
        
        <div class="upload-area" id="uploadArea">
            <div class="upload-icon">🎥</div>
            <p>拖拽视频到这里或点击上传</p>
            <input type="file" id="fileInput" accept="video/*" hidden>
            <button class="upload-btn" id="uploadBtn">选择视频</button>
        </div>

        <div class="loading" id="loading" style="display: none;">
            <div class="spinner"></div>
            <p id="loadingText">正在处理...</p>
        </div>

        <div id="resultSection" style="display: none;">
            <div class="preview-section">
                <h2>✨ 转换完成</h2>
                <div class="gif-preview">
                    <img id="gifPreview" alt="GIF预览">
                </div>
                <div style="text-align: center; margin-top: 20px;">
                    <button class="download-btn" id="downloadBtn" style="background: linear-gradient(135deg, #4caf50 0%, #45a049 100%); color: white; border: none; padding: 14px 30px; border-radius: 12px; font-size: 15px; font-weight: 600; cursor: pointer; margin: 15px 10px;">💾 下载GIF</button>
                    <button class="upload-btn" id="uploadGifBtn" style="display: inline-block; margin: 15px 10px;">☁️ 上传到图床</button>
                </div>
                <div class="url-section" id="urlSection" style="display: none;">
                    <label>🔗 图片链接（永久有效）</label>
                    <div class="url-display">
                        <input type="text" id="imageUrl" readonly>
                        <button class="copy-btn" id="copyBtn">复制</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 创建下雨效果
        function createRain() {
            const rainContainer = document.getElementById('rain');
            const numberOfDrops = 100;
            for (let i = 0; i < numberOfDrops; i++) {
                const drop = document.createElement('div');
                drop.className = 'rain-drop';
                drop.style.left = Math.random() * 100 + '%';
                drop.style.animationDelay = Math.random() * 2 + 's';
                drop.style.animationDuration = (Math.random() * 1 + 0.5) + 's';
                drop.style.opacity = Math.random() * 0.5 + 0.3;
                rainContainer.appendChild(drop);
            }
        }
        createRain();

        let currentMethod = 'simple';

        function selectMethod(method) {
            currentMethod = method;
            document.querySelectorAll('.method-btn').forEach(btn => btn.classList.remove('active'));
            event.target.closest('.method-btn').classList.add('active');
            
            if (method === 'advanced') {
                alert('高级模式需要加载 FFmpeg 库（约30MB），首次使用需要等待。\n\n如果网络不稳定，建议使用快速模式。');
            }
        }

        const uploadBtn = document.getElementById('uploadBtn');
        const fileInput = document.getElementById('fileInput');
        const uploadArea = document.getElementById('uploadArea');
        const loading = document.getElementById('loading');
        const loadingText = document.getElementById('loadingText');
        const resultSection = document.getElementById('resultSection');
        const gifPreview = document.getElementById('gifPreview');
        const downloadBtn = document.getElementById('downloadBtn');
        const uploadGifBtn = document.getElementById('uploadGifBtn');
        const copyBtn = document.getElementById('copyBtn');
        const imageUrl = document.getElementById('imageUrl');
        const urlSection = document.getElementById('urlSection');

        let generatedGifBlob = null;

        uploadBtn.addEventListener('click', () => fileInput.click());
        uploadArea.addEventListener('click', (e) => {
            if (e.target !== uploadBtn) fileInput.click();
        });

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file && file.type.startsWith('video/')) {
                handleVideoUpload(file);
            } else {
                alert('请选择视频文件！');
            }
        });

        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('drag-over');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('drag-over');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('drag-over');
            const file = e.dataTransfer.files[0];
            if (file && file.type.startsWith('video/')) {
                handleVideoUpload(file);
            } else {
                alert('请上传视频文件！');
            }
        });

        async function handleVideoUpload(file) {
            if (currentMethod === 'advanced') {
                // 跳转到高级版本
                window.location.href = 'video-to-gif.html';
                return;
            }

            uploadArea.style.display = 'none';
            loading.style.display = 'block';
            loadingText.textContent = '正在处理视频...';

            try {
                await convertVideoToGifSimple(file);
            } catch (error) {
                alert('转换失败: ' + error.message);
                uploadArea.style.display = 'block';
                loading.style.display = 'none';
            }
        }

        async function convertVideoToGifSimple(file) {
            loadingText.textContent = '正在读取视频...';
            
            // 创建视频元素
            const video = document.createElement('video');
            video.src = URL.createObjectURL(file);
            video.muted = true;
            
            await new Promise((resolve) => {
                video.onloadedmetadata = resolve;
            });

            loadingText.textContent = '正在提取帧...';
            
            // 使用 gif.js 库（轻量级）
            const script = document.createElement('script');
            script.src = 'https://cdn.jsdelivr.net/npm/gif.js@0.2.0/dist/gif.js';
            document.head.appendChild(script);
            
            await new Promise((resolve, reject) => {
                script.onload = resolve;
                script.onerror = () => reject(new Error('库加载失败'));
            });

            const gif = new GIF({
                workers: 2,
                quality: 10,
                width: 480,
                height: Math.round(480 * video.videoHeight / video.videoWidth)
            });

            const canvas = document.createElement('canvas');
            canvas.width = 480;
            canvas.height = Math.round(480 * video.videoHeight / video.videoWidth);
            const ctx = canvas.getContext('2d');

            // 提取帧
            const duration = Math.min(3, video.duration);
            const frameCount = 30;
            
            for (let i = 0; i < frameCount; i++) {
                video.currentTime = (duration / frameCount) * i;
                await new Promise(resolve => {
                    video.onseeked = resolve;
                });
                
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                gif.addFrame(ctx, { copy: true, delay: 100 });
                
                loadingText.textContent = `正在提取帧... ${Math.round((i + 1) / frameCount * 100)}%`;
            }

            loadingText.textContent = '正在生成GIF...';
            
            gif.on('finished', (blob) => {
                generatedGifBlob = blob;
                gifPreview.src = URL.createObjectURL(blob);
                loading.style.display = 'none';
                resultSection.style.display = 'block';
            });

            gif.render();
        }

        downloadBtn.addEventListener('click', () => {
            if (!generatedGifBlob) return;
            const url = URL.createObjectURL(generatedGifBlob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `gif-${Date.now()}.gif`;
            a.click();
            URL.revokeObjectURL(url);
        });

        uploadGifBtn.addEventListener('click', async () => {
            if (!generatedGifBlob) return;
            uploadGifBtn.disabled = true;
            uploadGifBtn.textContent = '上传中...';
            
            try {
                const reader = new FileReader();
                const base64Promise = new Promise((resolve, reject) => {
                    reader.onload = () => resolve(reader.result.split(',')[1]);
                    reader.onerror = reject;
                });
                reader.readAsDataURL(generatedGifBlob);
                const base64Data = await base64Promise;
                
                const formData = new FormData();
                formData.append('key', '35ba520f460239f6040b2342e05f9ddd');
                formData.append('image', base64Data);
                
                const response = await fetch('https://api.imgbb.com/1/upload', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                
                if (data.success && data.data) {
                    imageUrl.value = data.data.image.url;
                    urlSection.style.display = 'block';
                    uploadGifBtn.textContent = '✅ 上传成功';
                    uploadGifBtn.style.background = 'linear-gradient(135deg, #4caf50 0%, #45a049 100%)';
                } else {
                    throw new Error('上传失败');
                }
            } catch (error) {
                alert('上传失败: ' + error.message);
                uploadGifBtn.disabled = false;
                uploadGifBtn.textContent = '☁️ 上传到图床';
            }
        });

        copyBtn.addEventListener('click', () => {
            imageUrl.select();
            document.execCommand('copy');
            const originalText = copyBtn.textContent;
            copyBtn.textContent = '已复制！';
            copyBtn.style.background = 'linear-gradient(135deg, #4caf50 0%, #45a049 100%)';
            setTimeout(() => {
                copyBtn.textContent = originalText;
                copyBtn.style.background = '';
            }, 2000);
        });
    </script>
</body>
</html>
